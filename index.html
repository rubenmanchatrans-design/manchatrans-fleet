<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">

<title>Manchatrans Fleet</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --navy: #1a2332; --navy-light: #2e3d56;
  --accent: #f5a623; --text: #f0f4f8; --text-muted: #8fa3bc;
  --bg: #111820; --card: #1e2b3c; --card-border: #2a3d55;
  --success: #2ecc71; --danger: #e74c3c; --input-bg: #162030;
  --warning: #f0a030; --radius: 12px; --radius-sm: 8px;
}
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; font-size: 16px; }
.screen { display: none; min-height: 100vh; }
.screen.active { display: flex; flex-direction: column; }
#screen-login { align-items: center; justify-content: center; padding: 2rem 1.5rem; background: radial-gradient(ellipse at 50% 0%, #243044 0%, var(--bg) 70%); }
.login-logo { margin-bottom: 1rem; text-align:center; }
.login-company { font-size: 13px; color: var(--accent); font-weight: 600; text-align: center; letter-spacing: 0.05em; margin-bottom: 0.25rem; }
.login-title { font-size: 22px; font-weight: 700; text-align: center; margin-bottom: 0.25rem; }
.login-sub { font-size: 14px; color: var(--text-muted); text-align: center; margin-bottom: 2.5rem; }
.login-card { background: var(--card); border: 1px solid var(--card-border); border-radius: var(--radius); padding: 2rem 1.5rem; width: 100%; max-width: 360px; }
.form-label { font-size: 13px; font-weight: 500; color: var(--text-muted); margin-bottom: 0.5rem; display: block; text-transform: uppercase; letter-spacing: 0.05em; }
.form-input { width: 100%; background: var(--input-bg); border: 1px solid var(--card-border); border-radius: var(--radius-sm); color: var(--text); font-size: 16px; padding: 0.75rem 1rem; outline: none; transition: border-color 0.2s; -webkit-appearance: none; }
.form-input:focus { border-color: var(--accent); }
.form-group { margin-bottom: 1.25rem; }
.btn { width: 100%; padding: 0.9rem; border-radius: var(--radius-sm); border: none; font-size: 16px; font-weight: 600; cursor: pointer; transition: opacity 0.15s, transform 0.1s; }
.btn:active { transform: scale(0.98); opacity: 0.85; }
.btn-primary { background: var(--accent); color: #111; }
.btn-secondary { background: var(--navy-light); color: var(--text); }
.btn-ghost { background: transparent; color: var(--text-muted); border: 1px solid var(--card-border); }
.error-msg { color: var(--danger); font-size: 13px; margin-top: 0.75rem; text-align: center; min-height: 20px; }
.topbar { background: var(--navy); border-bottom: 1px solid var(--card-border); padding: 0.9rem 1.25rem; display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; z-index: 10; }
.topbar-title { font-size: 16px; font-weight: 600; }
.topbar-user { font-size: 13px; color: var(--accent); font-weight: 500; }
.topbar-logout { font-size: 13px; color: var(--text-muted); cursor: pointer; background: none; border: none; padding: 4px 8px; }
.body-content { flex: 1; padding: 1.25rem; overflow-y: auto; }
.section-title { font-size: 12px; font-weight: 600; color: var(--accent); text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 1rem; }
.card { background: var(--card); border: 1px solid var(--card-border); border-radius: var(--radius); padding: 1.25rem; margin-bottom: 1.25rem; }
.tab-pane { display: none; }
.tab-pane.active { display: block; }
.tabs { display: flex; background: var(--navy); border-top: 1px solid var(--card-border); position: sticky; bottom: 0; }
.tab-btn { flex: 1; padding: 0.85rem 0.5rem; border: none; background: none; color: var(--text-muted); font-size: 11px; font-weight: 500; cursor: pointer; display: flex; flex-direction: column; align-items: center; gap: 3px; transition: color 0.15s; }
.tab-btn svg { width: 22px; height: 22px; stroke: currentColor; fill: none; stroke-width: 1.8; }
.tab-btn.active { color: var(--accent); }
.atab-btn { flex:1; padding:0.6rem; font-size:11px; }
.alert { background: #1e3a1e; border: 1px solid #2a5a2a; color: #6dbf6d; border-radius: var(--radius-sm); padding: 0.75rem 1rem; font-size: 14px; text-align: center; margin-bottom: 1rem; display: none; }
.alert.show { display: block; }
.alert.error { background: #3a1e1e; border-color: #5a2a2a; color: #df6d6d; }
.empty-state { text-align: center; padding: 3rem 1rem; color: var(--text-muted); font-size: 14px; }
.empty-icon { font-size: 40px; margin-bottom: 0.75rem; }
textarea.form-input { resize: vertical; min-height: 90px; }
.badge { display: inline-block; background: var(--navy-light); border-radius: 20px; padding: 2px 10px; font-size: 12px; color: var(--text-muted); }
.record { background: var(--card); border: 1px solid var(--card-border); border-radius: var(--radius-sm); padding: 1rem; margin-bottom: 0.75rem; }
.record-top { display: flex; justify-content: space-between; align-items: center; margin-bottom: 0.5rem; }
.record-meta { font-size: 12px; color: var(--text-muted); display: flex; flex-wrap: wrap; gap: 8px; }
.estado-badge { padding: 3px 12px; border-radius: 20px; font-size: 12px; font-weight: 700; }
.estado-pendiente { background: #3a2e1e; color: var(--warning); }
.estado-reparacion { background: #1e2e3a; color: var(--accent); }
.estado-resuelto { background: #1e3a1e; color: var(--success); }
.mant-row { display: flex; justify-content: space-between; align-items: center; padding: 0.6rem 0; border-bottom: 1px solid var(--card-border); font-size: 13px; }
.mant-row:last-child { border-bottom: none; }
.alerta-mant { border-radius: var(--radius-sm); padding: 0.75rem 1rem; margin-bottom: 0.5rem; font-size: 13px; font-weight: 500; }
.loading-overlay { position: fixed; inset: 0; background: var(--bg); display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 999; gap: 1rem; }
.spinner { width: 40px; height: 40px; border: 3px solid var(--card-border); border-top-color: var(--accent); border-radius: 50%; animation: spin 0.8s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }
.btn-sm { padding: 4px 10px; border-radius: var(--radius-sm); font-size: 12px; cursor: pointer; border: 1px solid var(--card-border); background: var(--navy-light); color: var(--text); }
.btn-sm-danger { border-color: var(--danger); color: var(--danger); background: none; }
</style>
</head>
<body>

<!-- LOADING -->
<div class="loading-overlay" id="loading-overlay">
  <div style="font-size:42px">🚛</div>
  <div class="spinner" id="loading-spinner"></div>
  <div style="font-size:14px;color:var(--text-muted);" id="loading-msg">Conectando...</div>
  <button id="btn-retry" class="btn btn-primary" style="display:none;max-width:200px;" onclick="location.reload()">🔄 Reintentar</button>
</div>

<!-- LOGIN -->
<div id="screen-login" class="screen">
  <div class="login-logo"><div style="font-size:48px">🚛</div></div>
  <div class="login-company">MANCHATRANS S.L.</div>
  <div class="login-title">Fleet Manager</div>
  <div class="login-sub">Historial y Mantenimiento</div>
  <div class="login-card"></div>
  <div style="margin-top:2rem;font-size:13px;color:var(--text-muted);text-align:center;opacity:0.8;">Diseñada por <span style="color:var(--accent);font-weight:600;">Rubén Díaz</span></div>
</div>

<!-- ADMIN -->
<div id="screen-admin" class="screen">
  <div class="topbar">
    <span class="topbar-title">🚛 Fleet Admin</span>
    <button class="topbar-logout" id="btn-logout-admin">Salir</button>
  </div>
  <div class="body-content">
    <div style="display:flex;gap:0.4rem;margin-bottom:1.25rem;flex-wrap:wrap;">
      <button class="btn btn-secondary atab-btn" id="atab-btn-historial">Historial</button>
      <button class="btn btn-ghost atab-btn" id="atab-btn-mantenimiento">Mantenimiento</button>
      <button class="btn btn-ghost atab-btn" id="atab-btn-conductores">Conductores</button>
    </div>

    <!-- HISTORIAL DE CAMBIOS -->
    <div id="atab-historial" class="tab-pane active">
      <div class="section-title">Registrar cambio / reparación</div>
      <div id="hist-alert" class="alert"></div>
      <div class="card">
        <div class="form-group">
          <label class="form-label">Vehículo <span style="color:var(--danger)">*</span></label>
          <select class="form-input" id="hist-matricula">
            <option value="">— Selecciona vehículo —</option>
          </select>
        </div>
        <div class="form-group">
          <label class="form-label">Comentarios <span style="color:var(--danger)">*</span></label>
          <textarea class="form-input" id="hist-comentarios" placeholder="Describe el cambio o reparación realizada..."></textarea>
        </div>
        <button class="btn btn-primary" id="btn-guardar-hist">Guardar registro</button>
      </div>
      <div class="section-title">Historial de cambios</div>
      <div style="display:flex;gap:0.5rem;margin-bottom:0.75rem;">
        <button class="btn btn-secondary" id="btn-hist-todos" style="flex:1;padding:0.6rem;font-size:13px;">Ver todo</button>
        <button class="btn btn-ghost" id="btn-hist-filtrar" style="flex:1;padding:0.6rem;font-size:13px;">Filtrar por vehículo</button>
      </div>
      <div class="form-group" id="hist-filter-wrapper" style="display:none;">
        <select class="form-input" id="hist-filter-mat" style="font-size:14px;padding:0.6rem;">
          <option value="">— Selecciona vehículo —</option>
        </select>
      </div>
      <div id="hist-list"></div>
    </div>

    <!-- MANTENIMIENTO -->
    <div id="atab-mantenimiento" class="tab-pane">
      <div class="section-title">ITV y Tacógrafo por vehículo</div>
      <button class="btn btn-secondary" style="margin-bottom:1rem;" id="btn-ver-pendientes">📅 Ver pendientes este mes</button>
      <div id="mant-alertas"></div>
      <div id="mant-list"></div>
    </div>

    <!-- CONDUCTORES -->
    <div id="atab-conductores" class="tab-pane">
      <div id="cond-alert" class="alert"></div>
      <div class="card" style="margin-bottom:1rem;">
        <div class="section-title">Añadir conductor</div>
        <div class="form-group">
          <label class="form-label">Nombre completo</label>
          <input class="form-input" type="text" id="new-driver-name" placeholder="Nombre completo">
        </div>
        <div class="form-group">
          <label class="form-label">Código de acceso</label>
          <input class="form-input" type="text" id="new-driver-code" placeholder="Ej: 3062" autocomplete="off">
        </div>
        <button class="btn btn-primary" id="btn-add-driver">Añadir conductor</button>
      </div>
      <div class="section-title">Conductores activos (<span id="driver-count">0</span>)</div>
      <div id="driver-list"></div>
    </div>

  </div>
</div>

<script type="module">
import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js';
import { getFirestore, collection, doc, getDocs, addDoc, setDoc, updateDoc, deleteDoc, query, orderBy } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js';

const firebaseConfig = {
  apiKey: "AIzaSyDsyKlniyo6eekC7SdWA_bzeTAaDFn03-w",
  authDomain: "manchatrans-fleet.firebaseapp.com",
  projectId: "manchatrans-fleet",
  storageBucket: "manchatrans-fleet.firebasestorage.app",
  messagingSenderId: "605753143630",
  appId: "1:605753143630:web:b02d5f0b83e2b77e022e1f"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

// ══════════════════════════════
// CONSTANTES
// ══════════════════════════════
const ADMIN_USER = 'admin';
const ADMIN_PASS = 'admin2026';
const DIAS_AVISO = 20;
const REVISIONES = ['ITV','Tacógrafo'];

const MATRICULAS = [
  '0044-HBJ','0328-MMR','0390-LWZ','0608-KFG','0620-MPR','0633-NGH',
  '0724-KFG','1789-LZR','1931-CWD','1979-LMH','3257-LGZ','3299-MZB',
  '3341-GZJ','3402-NMD','3570-MWX','3817-BBW','3911-KZK','4324-MDJ',
  '4470-MLB','4870-CZR','4953-CYB','5039-MSZ','5167-BHZ','5271-KZT',
  '5343-NFD','6319-LKW','6354-LKW','6492-MMP','7062-NJL','7179-FVM',
  '7511-FWW','7651-MHP','7999-KXZ','8182-MFM','8343-LXM','5340-CWZ',
  '8918-LSR','8929-MXW','9233-DVZ','CR-9637-X','TOROS CESAB'
];

const DEFAULT_DRIVERS = [
  {code:'3035',name:'AGUSTIN CUESTA GUTIERREZ'},{code:'3008',name:'ALBERTO BRIÑAS LOPEZ'},
  {code:'3028',name:'ALEXIS MENDIETA AGUILERA'},{code:'3041',name:'ANGEL PATRICIO ORTEGA DE LA CRUZ'},
  {code:'3042',name:'CARLOS MUÑOZ PAVON'},{code:'3010',name:'CRISTIAN SANCHEZ CONSUEGRA'},
  {code:'3003',name:'CRISTOBAL MARQUEZ FLORES'},{code:'3054',name:'DAVID DOMINGUEZ HERRERA'},
  {code:'3033',name:'DIONISIO ROBLES ROBLES'},{code:'3030',name:'EDISON XAVIER ORTEGA MONTALEZA'},
  {code:'3018',name:'ENRIQUE JAVIER RUIZ ARENAS'},{code:'3007',name:'FERNANDO DIAZ ASTILLEROS'},
  {code:'3025',name:'FELIX JIMENEZ JIMENEZ'},{code:'3058',name:'FRANCISCO CALZADO COLETO'},
  {code:'3057',name:'FRANCISCO RODRIGO CUEVA'},{code:'3043',name:'ISMAEL AMO GARCIA'},
  {code:'3026',name:'JAVIER DELGADO RODRIGO'},{code:'3055',name:'JAVIER VALDELOMAR LOPEZ DEL PRADO'},
  {code:'3014',name:'JOSE DONATE NARANJO'},{code:'3009',name:'JOSE A. FERNANDEZ MONTERO'},
  {code:'3027',name:'JOSE JAVIER ROBLEDO LOPEZ'},{code:'3011',name:'JOSE MANUEL DE LA FUENTE'},
  {code:'3052',name:'JOSE MUÑOZ FRAGOSO'},{code:'3061',name:'JUAN ANTONIO PINEÑO GOMEZ'},
  {code:'3004',name:'JUAN DE DIOS DIAZ OLIVER'},{code:'3024',name:'LUIS JESUS DIAZ OLIVER'},
  {code:'3002',name:'MAXIMO RODRIGUEZ REINA'},{code:'3012',name:'MIGUEL PAZ ALCAIDE'},
  {code:'3032',name:'ROBERTO DE LA FUENTE LOPEZ'},{code:'3019',name:'ROBERTO RODRIGUEZ RODRIGUEZ'},
  {code:'3034',name:'RUBEN PESQUERA CESPEDES'},{code:'3016',name:'SANTIAGO RAEZ MADRID'},
  {code:'3006',name:'SANTOS DIAZ ASTILLEROS'},{code:'3021',name:'SERGIO ANGULO SANCHEZ'},
  {code:'3029',name:'VALENTIN LIGERO DIAZ-PAVON'},{code:'3015',name:'VICENTE CANO GARCIA'},
  {code:'3005',name:'VICENTE DIAZ ASTILLEROS'},{code:'3039',name:'VICTOR PASCUAL SANTIAGO'}
];

let currentUser = null;
let driversCache = [];
let historialCache = [];
let mantenimientoCache = [];
let histFiltroMat = '';

// ══════════════════════════════
// INIT
// ══════════════════════════════
async function initApp() {
  const t1 = setTimeout(()=>{ document.getElementById('loading-msg').textContent='Tardando más de lo normal...'; document.getElementById('loading-msg').style.color='#f0a030'; }, 2000);
  const t2 = setTimeout(()=>{ document.getElementById('loading-msg').textContent='Sin conexión. Recargando...'; document.getElementById('loading-msg').style.color='var(--danger)'; setTimeout(()=>location.reload(),1500); }, 8000);
  try {
    const dSnap = await getDocs(collection(db,'conductores'));
    if (dSnap.empty) { for (const d of DEFAULT_DRIVERS) await setDoc(doc(db,'conductores',d.code),d); driversCache=[...DEFAULT_DRIVERS]; }
    else driversCache = dSnap.docs.map(d=>d.data());

    const hSnap = await getDocs(query(collection(db,'historial'),orderBy('fecha','desc')));
    historialCache = hSnap.docs.map(d=>({id:d.id,...d.data()}));

    const mSnap = await getDocs(collection(db,'mantenimiento'));
    mantenimientoCache = mSnap.docs.map(d=>({id:d.id,...d.data()}));
    clearTimeout(t1); clearTimeout(t2);
  } catch(e) {
    clearTimeout(t1); clearTimeout(t2);
    document.getElementById('loading-msg').textContent='Error de conexión. Recargando...';
    document.getElementById('loading-msg').style.color='var(--danger)';
    setTimeout(()=>location.reload(),2000); return;
  }
  document.getElementById('loading-overlay').style.display='none';
  buildLoginForm(); showScreen('login');

  // Event listeners
  document.getElementById('btn-logout-admin').addEventListener('click', doLogout);
  document.getElementById('atab-btn-historial').addEventListener('click', ()=>switchAdminTab('historial'));
  document.getElementById('atab-btn-mantenimiento').addEventListener('click', ()=>switchAdminTab('mantenimiento'));
  document.getElementById('atab-btn-conductores').addEventListener('click', ()=>switchAdminTab('conductores'));
  document.getElementById('btn-add-driver').addEventListener('click', addDriver);
  document.getElementById('btn-guardar-hist').addEventListener('click', guardarHistorial);
  document.getElementById('hist-filter-mat').addEventListener('change', (e)=>{ histFiltroMat=e.target.value; renderHistorial(); });
  document.getElementById('btn-hist-todos').addEventListener('click', ()=>{
    histFiltroMat='';
    document.getElementById('hist-filter-wrapper').style.display='none';
    document.getElementById('hist-filter-mat').value='';
    document.getElementById('btn-hist-todos').className='btn btn-secondary';
    document.getElementById('btn-hist-filtrar').className='btn btn-ghost';
    renderHistorial();
  });
  document.getElementById('btn-hist-filtrar').addEventListener('click', ()=>{
    document.getElementById('hist-filter-wrapper').style.display='block';
    document.getElementById('btn-hist-todos').className='btn btn-ghost';
    document.getElementById('btn-hist-filtrar').className='btn btn-secondary';
  });
  document.getElementById('btn-ver-pendientes').addEventListener('click', verPendientesMes);
  populateHistMatriculas();

  // Comprobar si es día 1 del mes para mostrar alerta automática
  if (new Date().getDate() === 1) {
    setTimeout(()=>{ if(currentUser && currentUser.isAdmin) verPendientesMes(true); }, 500);
  }
}

// ══════════════════════════════
// LOGIN (solo admin)
// ══════════════════════════════
function buildLoginForm() {
  const card = document.querySelector('.login-card');
  card.innerHTML=`
    <div class="form-group"><label class="form-label">Usuario</label><input class="form-input" type="text" id="admin-user" placeholder="admin" autocomplete="off"></div>
    <div class="form-group"><label class="form-label">Contraseña</label><input class="form-input" type="password" id="admin-pass" placeholder="••••••" autocomplete="off"></div>
    <button class="btn btn-primary" id="btn-login-admin">Entrar</button>
    <div class="error-msg" id="login-error"></div>`;
  setTimeout(()=>{
    document.getElementById('btn-login-admin').addEventListener('click',doLogin);
    document.getElementById('admin-user').addEventListener('keydown',e=>{ if(e.key==='Enter') doLogin(); });
    document.getElementById('admin-pass').addEventListener('keydown',e=>{ if(e.key==='Enter') doLogin(); });
  },50);
}

function doLogin() {
  const err=document.getElementById('login-error');
  const u=(document.getElementById('admin-user').value||'').trim().toLowerCase();
  const p=(document.getElementById('admin-pass').value||'').trim();
  if (u===ADMIN_USER&&p===ADMIN_PASS) { currentUser={name:'Administrador',isAdmin:true}; showScreen('admin'); renderAdminPage(); return; }
  err.textContent='Usuario o contraseña incorrectos';
}

function doLogout() { location.reload(); }
function showScreen(name) { document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active')); document.getElementById('screen-'+name).classList.add('active'); }

// ══════════════════════════════
// HISTORIAL DE CAMBIOS
// ══════════════════════════════
function populateHistMatriculas() {
  const sel = document.getElementById('hist-matricula');
  const selFilter = document.getElementById('hist-filter-mat');
  if (sel) { sel.innerHTML = '<option value="">— Selecciona vehículo —</option>'; MATRICULAS.forEach(m=>{ sel.innerHTML+=`<option value="${m}">${m}</option>`; }); }
  if (selFilter) { selFilter.innerHTML = '<option value="">— Selecciona vehículo —</option>'; MATRICULAS.forEach(m=>{ selFilter.innerHTML+=`<option value="${m}">${m}</option>`; }); }
}

async function guardarHistorial() {
  const mat = document.getElementById('hist-matricula').value;
  const comentarios = document.getElementById('hist-comentarios').value.trim();
  const al = document.getElementById('hist-alert');
  if (!mat) { showAlert(al,'⚠️ Selecciona el vehículo',true); return; }
  if (!comentarios) { showAlert(al,'⚠️ Escribe el comentario del cambio realizado',true); return; }
  const now = new Date();
  const registro = { matricula: mat, comentarios, fecha: now.toISOString(), fechaStr: now.toLocaleDateString('es-ES'), horaStr: now.toLocaleTimeString('es-ES',{hour:'2-digit',minute:'2-digit'}) };
  try {
    const ref = await addDoc(collection(db,'historial'), registro);
    historialCache.unshift({id:ref.id,...registro});
    document.getElementById('hist-matricula').value='';
    document.getElementById('hist-comentarios').value='';
    showAlert(al,'✓ Registro guardado correctamente',false);
    renderHistorial();
  } catch(e) { showAlert(al,'Error al guardar: '+e.message,true); }
}

function renderHistorial() {
  const list = document.getElementById('hist-list');
  let f = histFiltroMat ? historialCache.filter(h=>h.matricula===histFiltroMat) : historialCache;
  if (!f.length) { list.innerHTML='<div class="empty-state"><div class="empty-icon">📋</div>No hay registros'+(histFiltroMat?' para este vehículo':'')+'</div>'; return; }
  list.innerHTML = f.map(h=>{
    const safeId = h.id.replace(/[^a-zA-Z0-9]/g,'_');
    return `<div style="background:var(--card);border:1px solid var(--card-border);border-radius:var(--radius-sm);margin-bottom:0.5rem;overflow:hidden;">
      <div onclick="toggleHist('${safeId}')" style="display:flex;justify-content:space-between;align-items:center;padding:0.85rem 1rem;cursor:pointer;">
        <div>
          <div style="font-weight:600;font-size:14px;">🚗 ${h.matricula}</div>
          <div style="font-size:12px;color:var(--text-muted);margin-top:2px;">📅 ${h.fechaStr} ${h.horaStr}</div>
        </div>
        <span id="hist-arrow-${safeId}" style="color:var(--text-muted);font-size:12px;">▼</span>
      </div>
      <div id="hist-body-${safeId}" style="display:none;padding:0 1rem 1rem 1rem;border-top:1px solid var(--card-border);">
        <div style="font-size:14px;margin:0.75rem 0;line-height:1.5;">${h.comentarios}</div>
        <div style="display:flex;gap:0.5rem;">
          <button class="btn-sm" style="flex:1;" onclick="editarHistorial('${h.id}')">✏️ Editar</button>
          <button class="btn-sm btn-sm-danger" style="flex:1;" onclick="eliminarHistorial('${h.id}')">🗑 Eliminar</button>
        </div>
      </div>
    </div>`;
  }).join('');
}

window.toggleHist = (safeId) => {
  const body=document.getElementById('hist-body-'+safeId);
  const arrow=document.getElementById('hist-arrow-'+safeId);
  if(body.style.display==='none'){ body.style.display='block'; arrow.textContent='▲'; }
  else { body.style.display='none'; arrow.textContent='▼'; }
};

window.editarHistorial = (id) => {
  const h = historialCache.find(x=>x.id===id);
  if (!h) return;
  const modal = document.createElement('div');
  modal.id = 'edit-hist-modal';
  modal.style.cssText = 'position:fixed;inset:0;background:rgba(0,0,0,0.7);z-index:999;display:flex;align-items:center;justify-content:center;padding:1rem;';
  modal.innerHTML = `
    <div style="background:var(--card);border:1px solid var(--card-border);border-radius:var(--radius);padding:1.5rem;width:100%;max-width:400px;">
      <div style="font-size:16px;font-weight:700;margin-bottom:1.25rem;color:var(--accent);">✏️ Editar registro — ${h.matricula}</div>
      <div class="form-group">
        <label class="form-label">Comentarios</label>
        <textarea class="form-input" id="edit-hist-comentarios">${h.comentarios}</textarea>
      </div>
      <div style="display:flex;gap:0.5rem;">
        <button id="btn-save-hist-edit" style="flex:1;padding:0.75rem;background:var(--accent);color:#111;border:none;border-radius:var(--radius-sm);font-size:15px;font-weight:700;cursor:pointer;">Guardar</button>
        <button onclick="document.getElementById('edit-hist-modal').remove()" style="flex:1;padding:0.75rem;background:var(--navy-light);color:var(--text);border:1px solid var(--card-border);border-radius:var(--radius-sm);font-size:15px;cursor:pointer;">Cancelar</button>
      </div>
    </div>`;
  document.body.appendChild(modal);
  document.getElementById('btn-save-hist-edit').addEventListener('click', async () => {
    const comentarios = document.getElementById('edit-hist-comentarios').value.trim();
    if (!comentarios) { alert('Escribe el comentario'); return; }
    try {
      await updateDoc(doc(db,'historial',id), {comentarios});
      const idx = historialCache.findIndex(x=>x.id===id);
      if (idx>=0) historialCache[idx].comentarios = comentarios;
      document.getElementById('edit-hist-modal').remove();
      renderHistorial();
    } catch(e) { alert('Error: '+e.message); }
  });
};

window.eliminarHistorial = async (id) => {
  if (!confirm('¿Eliminar este registro del historial?')) return;
  try {
    await deleteDoc(doc(db,'historial',id));
    historialCache = historialCache.filter(h=>h.id!==id);
    renderHistorial();
  } catch(e) { alert('Error: '+e.message); }
};

// ══════════════════════════════
// ADMIN
// ══════════════════════════════
function renderAdminPage() { renderHistorial(); renderMantenimiento(); renderDriverList(); updateTabBadges(); }

function switchAdminTab(tab) {
  document.querySelectorAll('#screen-admin .tab-pane').forEach(p=>p.classList.remove('active'));
  document.getElementById('atab-'+tab).classList.add('active');
  ['historial','mantenimiento','conductores'].forEach(t=>{ document.getElementById('atab-btn-'+t).className='btn atab-btn '+(t===tab?'btn-secondary':'btn-ghost'); });
  if (tab==='historial') renderHistorial();
  if (tab==='mantenimiento') renderMantenimiento();
  if (tab==='conductores') renderDriverList();
}

function updateTabBadges() {
  const hoy=new Date(); let alertas=0;
  mantenimientoCache.forEach(m=>{ REVISIONES.forEach(rev=>{ const key=revKey(rev); if(m[key]){ const dias=Math.ceil((new Date(m[key])-hoy)/(1000*60*60*24)); if(dias<=DIAS_AVISO) alertas++; } }); });
  document.getElementById('atab-btn-mantenimiento').textContent=alertas>0?`Mantenimiento 🔴${alertas}`:'Mantenimiento';
}

// ══════════════════════════════
// MANTENIMIENTO
// ══════════════════════════════
function revKey(rev) { return rev.toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,''); }

function renderMantenimiento() {
  const list=document.getElementById('mant-list');
  const alertasEl=document.getElementById('mant-alertas');
  const hoy=new Date();
  let alertasHtml='';

  mantenimientoCache.forEach(m=>{
    REVISIONES.forEach(rev=>{
      const key=revKey(rev);
      if (!m[key]) return;
      const fecha=new Date(m[key]);
      const dias=Math.ceil((fecha-hoy)/(1000*60*60*24));
      if (dias<=DIAS_AVISO) {
        const color=dias<0?'var(--danger)':dias<=5?'#ff6b00':'var(--warning)';
        const txt=dias<0?`Vencida hace ${Math.abs(dias)} días`:`Vence en ${dias} días`;
        alertasHtml+=`<div style="background:#3a1e1e;border:1px solid ${color};border-radius:var(--radius-sm);padding:0.75rem 1rem;margin-bottom:0.5rem;font-size:13px;">⚠️ <strong>${m.matricula}</strong> — ${rev}: <span style="color:${color};font-weight:700;">${txt}</span> (${fecha.toLocaleDateString('es-ES')})</div>`;
      }
    });
  });
  alertasEl.innerHTML=alertasHtml?`<div style="margin-bottom:1.25rem;">${alertasHtml}</div>`:'';

  list.innerHTML=MATRICULAS.map((mat,idx)=>{
    const m=mantenimientoCache.find(x=>x.matricula===mat)||{matricula:mat};
    // Check if any revision has alert
    let tieneAlerta = false;
    REVISIONES.forEach(rev=>{ const key=revKey(rev); if(m[key]){ const dias=Math.ceil((new Date(m[key])-hoy)/(1000*60*60*24)); if(dias<=DIAS_AVISO) tieneAlerta=true; } });
    const safeId = mat.replace(/[^a-zA-Z0-9]/g,'_');
    return `<div style="background:var(--card);border:1px solid var(--card-border);border-radius:var(--radius-sm);margin-bottom:0.5rem;overflow:hidden;">
      <div onclick="toggleMant('${safeId}')" style="display:flex;justify-content:space-between;align-items:center;padding:0.85rem 1rem;cursor:pointer;">
        <span style="font-size:14px;font-weight:600;">🚗 ${mat} ${tieneAlerta?'<span style="color:var(--danger);font-size:12px;">⚠️</span>':''}</span>
        <span id="arrow-${safeId}" style="color:var(--text-muted);font-size:12px;">▼</span>
      </div>
      <div id="mant-body-${safeId}" style="display:none;padding:0 1rem 1rem 1rem;border-top:1px solid var(--card-border);">
        ${REVISIONES.map(rev=>{
          const key=revKey(rev);
          const keyUltima=key+'_ultima';
          const fechaStr=m[key];
          const fecha=fechaStr?new Date(fechaStr):null;
          const fechaUltimaStr=m[keyUltima];
          const dias=fecha?Math.ceil((fecha-hoy)/(1000*60*60*24)):null;
          let color='var(--text-muted)';
          if(dias!==null){ if(dias<0) color='var(--danger)'; else if(dias<=DIAS_AVISO) color='var(--warning)'; else color='var(--success)'; }
          return `<div class="mant-row" style="flex-direction:column;align-items:flex-start;gap:6px;">
            <div style="display:flex;justify-content:space-between;width:100%;align-items:center;">
              <span style="font-weight:500;">${rev}</span>
              <div style="display:flex;align-items:center;gap:0.5rem;">
                <span style="color:${color};font-size:13px;">${fecha?fecha.toLocaleDateString('es-ES'):'Sin fecha'}</span>
                <button class="btn-sm" onclick="editMant('${mat}','${rev}')">Editar</button>
              </div>
            </div>
            ${fechaUltimaStr?`<div style="font-size:11px;color:var(--text-muted);">Última vez: ${new Date(fechaUltimaStr).toLocaleDateString('es-ES')}</div>`:''}
          </div>`;
        }).join('')}
      </div>
    </div>`;
  }).join('');
}

window.toggleMant = (safeId) => {
  const body = document.getElementById('mant-body-'+safeId);
  const arrow = document.getElementById('arrow-'+safeId);
  if (body.style.display === 'none') {
    body.style.display = 'block';
    arrow.textContent = '▲';
  } else {
    body.style.display = 'none';
    arrow.textContent = '▼';
  }
};

window.verPendientesMes = (esAutomatico) => {
  const hoy = new Date();
  const mesActual = hoy.getMonth();
  const anioActual = hoy.getFullYear();
  const nombreMes = hoy.toLocaleDateString('es-ES',{month:'long',year:'numeric'});

  let pendientes = [];
  mantenimientoCache.forEach(m => {
    REVISIONES.forEach(rev => {
      const key = revKey(rev);
      if (!m[key]) return;
      const fecha = new Date(m[key]);
      if (fecha.getMonth() === mesActual && fecha.getFullYear() === anioActual) {
        pendientes.push({matricula: m.matricula, revision: rev, fecha});
      }
    });
  });
  pendientes.sort((a,b) => a.fecha - b.fecha);

  const modal = document.createElement('div');
  modal.id = 'pendientes-modal';
  modal.style.cssText = 'position:fixed;inset:0;background:rgba(0,0,0,0.8);z-index:999;display:flex;align-items:flex-start;justify-content:center;padding:1rem;overflow-y:auto;';
  modal.innerHTML = `
    <div style="background:var(--card);border:1px solid var(--card-border);border-radius:var(--radius);padding:1.5rem;width:100%;max-width:450px;margin:auto;">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:1.25rem;">
        <div style="font-size:17px;font-weight:700;color:var(--accent);">📅 Pendientes de ${nombreMes}</div>
        <button onclick="document.getElementById('pendientes-modal').remove()" style="background:var(--navy-light);color:var(--text);border:1px solid var(--card-border);border-radius:var(--radius-sm);padding:6px 12px;font-size:13px;cursor:pointer;">✕</button>
      </div>
      ${pendientes.length === 0
        ? '<div class="empty-state"><div class="empty-icon">✅</div>No hay ITV ni Tacógrafos que venzan este mes</div>'
        : pendientes.map(p => {
            const dias = Math.ceil((p.fecha - hoy)/(1000*60*60*24));
            const color = dias < 0 ? 'var(--danger)' : dias <= 5 ? '#ff6b00' : 'var(--warning)';
            const txt = dias < 0 ? `Vencida hace ${Math.abs(dias)} días` : dias === 0 ? 'Vence hoy' : `Vence en ${dias} días`;
            return `<div style="background:var(--input-bg);border:1px solid var(--card-border);border-radius:var(--radius-sm);padding:0.85rem 1rem;margin-bottom:0.5rem;">
              <div style="display:flex;justify-content:space-between;align-items:center;">
                <span style="font-weight:600;font-size:14px;">🚗 ${p.matricula} — ${p.revision}</span>
              </div>
              <div style="font-size:13px;color:${color};font-weight:600;margin-top:4px;">${txt} (${p.fecha.toLocaleDateString('es-ES')})</div>
            </div>`;
          }).join('')
      }
    </div>`;
  document.body.appendChild(modal);
};

window.editMant = (mat, rev) => {
  const m=mantenimientoCache.find(x=>x.matricula===mat)||{matricula:mat};
  const key=revKey(rev);
  const keyUltima=key+'_ultima';
  const modal=document.createElement('div');
  modal.id='mant-modal';
  modal.style.cssText='position:fixed;inset:0;background:rgba(0,0,0,0.7);z-index:999;display:flex;align-items:center;justify-content:center;padding:1rem;';
  modal.innerHTML=`
    <div style="background:var(--card);border:1px solid var(--card-border);border-radius:var(--radius);padding:1.5rem;width:100%;max-width:380px;">
      <div style="font-size:16px;font-weight:700;margin-bottom:1.25rem;color:var(--accent);">🔧 ${rev} — ${mat}</div>
      <div class="form-group"><label class="form-label">Última vez que se pasó</label>
      <input class="form-input" type="date" id="mant-fecha-ultima" value="${m[keyUltima]||''}"></div>
      <div class="form-group"><label class="form-label">Próxima fecha</label>
      <input class="form-input" type="date" id="mant-fecha" value="${m[key]||''}"></div>
      <div style="display:flex;gap:0.5rem;">
        <button id="btn-save-mant" style="flex:1;padding:0.75rem;background:var(--accent);color:#111;border:none;border-radius:var(--radius-sm);font-size:15px;font-weight:700;cursor:pointer;">Guardar</button>
        <button onclick="document.getElementById('mant-modal').remove()" style="flex:1;padding:0.75rem;background:var(--navy-light);color:var(--text);border:1px solid var(--card-border);border-radius:var(--radius-sm);font-size:15px;cursor:pointer;">Cancelar</button>
      </div>
    </div>`;
  document.body.appendChild(modal);
  document.getElementById('btn-save-mant').addEventListener('click', async ()=>{
    const fecha=document.getElementById('mant-fecha').value;
    const fechaUltima=document.getElementById('mant-fecha-ultima').value;
    if (!fecha) { alert('Selecciona la próxima fecha'); return; }
    try {
      const idx=mantenimientoCache.findIndex(x=>x.matricula===mat);
      const updates = {[key]:fecha, [keyUltima]:fechaUltima||null};
      if(idx>=0) { Object.assign(mantenimientoCache[idx],updates); await setDoc(doc(db,'mantenimiento',mat),mantenimientoCache[idx]); }
      else { const nuevo={matricula:mat,...updates}; mantenimientoCache.push(nuevo); await setDoc(doc(db,'mantenimiento',mat),nuevo); }
      document.getElementById('mant-modal').remove();
      renderMantenimiento(); updateTabBadges();
    } catch(e) { alert('Error: '+e.message); }
  });
};

// ══════════════════════════════
// CONDUCTORES
// ══════════════════════════════
function renderDriverList() {
  const list=document.getElementById('driver-list');
  document.getElementById('driver-count').textContent=driversCache.length;
  list.innerHTML=driversCache.map(d=>`
    <div style="background:var(--card);border:1px solid var(--card-border);border-radius:var(--radius-sm);padding:0.75rem 1rem;display:flex;justify-content:space-between;align-items:center;margin-bottom:0.5rem;">
      <div><div style="font-size:14px;">${d.name}</div><div style="font-size:12px;color:var(--accent);font-weight:600;margin-top:2px;">Código: ${d.code}</div></div>
      <button class="btn-sm btn-sm-danger" onclick="deleteDriver('${d.code}')">Eliminar</button>
    </div>`).join('');
}

async function addDriver() {
  const name=document.getElementById('new-driver-name').value.trim();
  const code=document.getElementById('new-driver-code').value.trim();
  const al=document.getElementById('cond-alert');
  if(!name||!code){showAlert(al,'Rellena nombre y código',true);return;}
  if(driversCache.find(d=>d.code===code)){showAlert(al,'Ese código ya existe',true);return;}
  try {
    await setDoc(doc(db,'conductores',code),{name,code});
    driversCache.push({name,code});
    document.getElementById('new-driver-name').value='';
    document.getElementById('new-driver-code').value='';
    renderDriverList();
    showAlert(al,`✓ Conductor "${name}" añadido`,false);
  } catch(e){showAlert(al,'Error al guardar',true);}
}

window.deleteDriver = async (code) => {
  if(!confirm('¿Eliminar este conductor?')) return;
  try { await deleteDoc(doc(db,'conductores',code)); driversCache=driversCache.filter(d=>d.code!==code); renderDriverList(); }
  catch(e){alert('Error al eliminar');}
};

// ══════════════════════════════
// UTILS
// ══════════════════════════════
function showAlert(el,msg,isError) {
  el.textContent=msg; el.className='alert show'+(isError?' error':'');
  setTimeout(()=>el.className='alert',4500);
}

// ARRANCAR
initApp();
</script>
</body>
</html>
